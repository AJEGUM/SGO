<div class="min-h-screen  p-6 font-sans">
  <header class="max-w-4xl mx-auto mb-8">
    <h1 class="text-3xl font-bold text-[var(--color-sena-black)] flex items-center gap-3">
      <i class="pi pi-cog text-[var(--color-sena)]"></i>
      Configuración del Sistema
    </h1>
    <p class="text-gray-600 mt-2">Gestiona el comportamiento de la IA y parámetros globales del OVA.</p>
  </header>

  <main class="max-w-4xl mx-auto space-y-6">
    
    <app-config-prompt 
      [(prompt)]="config.prompt_sistema_ova"
      [cargando]="cargando"
      [guardando]="guardando['prompt_sistema_ova']"
      [exito]="exito['prompt_sistema_ova']"
      (onGuardar)="guardar('prompt_sistema_ova')">
    </app-config-prompt>

    <app-config-intentos-test
      [(intentos)]="config.intentos_test_ova"
      [guardando]="guardando['intentos_test_ova']"
      [exito]="exito['intentos_test_ova']"
      (onActualizar)="guardar('intentos_test_ova')">
    </app-config-intentos-test>

    <app-config-umbral
      [(umbral)]="config.umbral_min_ova"
      [guardando]="guardando['umbral_min_ova']"
      [exito]="exito['umbral_min_ova']"
      (onGuardar)="guardar('umbral_min_ova')">
    </app-config-umbral>
  </main>
</div>
