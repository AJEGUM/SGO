<div class="min-h-screen bg-slate-50 p-6 lg:p-5 font-sans">
  <div class="max-w-6xl mx-auto">
    
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-10">
      <div>
        <h1 class="text-3xl font-bold text-slate-900 flex items-center gap-3">
          <i class="pi pi-shield text-sena text-3xl"></i>
          Control de Acceso
        </h1>
        <p class="text-slate-500 text-lg italic mt-1">
          Despliegue de credenciales mediante invitaciones seguras al correo institucional.
        </p>
      </div>
    </div>

    <div class="mb-12">
      <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="flex flex-col lg:flex-row">
          
          <div class="lg:w-1/3 bg-slate-50/50 p-8 border-b lg:border-b-0 lg:border-r border-slate-100">
            <div class="flex items-center gap-3 mb-8">
              <div class="w-10 h-10 bg-sena/10 rounded-xl flex items-center justify-center text-sena">
                <i class="pi pi-user-plus text-lg"></i>
              </div>
              <h3 class="font-bold text-slate-800 uppercase text-xs tracking-widest">Protocolo de Invitación</h3>
            </div>
            
            <ul class="space-y-6">
              <li class="flex gap-4">
                <div class="w-6 h-6 rounded-lg bg-white shadow-sm text-sena border border-slate-100 flex items-center justify-center text-[10px] font-bold shrink-0">1</div>
                <div>
                  <p class="text-sm text-slate-700 font-bold">Generación de Token</p>
                  <p class="text-xs text-slate-400 italic">Clave única válida por 24 horas.</p>
                </div>
              </li>
              <li class="flex gap-4">
                <div class="w-6 h-6 rounded-lg bg-white shadow-sm text-sena border border-slate-100 flex items-center justify-center text-[10px] font-bold shrink-0">2</div>
                <div>
                  <p class="text-sm text-slate-700 font-bold">Asignación de Rol</p>
                  <p class="text-xs text-slate-400 italic">Define el nivel de acceso al sistema.</p>
                </div>
              </li>
            </ul>
          </div>

          <div class="lg:flex-1 p-8 md:p-10">
            <form [formGroup]="invitacionForm" (ngSubmit)="enviarInvitacion()" class="space-y-6">
              
              <div class="grid grid-cols-1 gap-6">
                
                <div class="group">
                  <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Correo Institucional</label>
                  <div class="relative">
                    <i class="pi pi-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-sena transition-colors"></i>
                    <input formControlName="email" type="email" placeholder="ejemplo@sena.edu.co"
                      class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:bg-white focus:ring-2 focus:ring-sena/10 focus:border-sena/40 transition-all font-medium text-slate-700">
                  </div>
                </div>

                <div class="group">
                  <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Rol Administrativo</label>
                  <div class="relative">
                    <i class="pi pi-shield absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-sena z-10"></i>
                    <select formControlName="rol_id" 
                      class="w-full pl-12 pr-10 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:bg-white focus:ring-2 focus:ring-sena/10 focus:border-sena/40 transition-all font-medium text-slate-700 appearance-none cursor-pointer">
                      <option value="" disabled selected>Seleccionar Rol</option>
                      <option *ngFor="let rol of roles" [value]="rol.id">{{ rol.nombre_rol }}</option>
                    </select>
                    <i class="pi pi-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-[10px] text-slate-300 pointer-events-none"></i>
                  </div>
                </div>

              </div>

              <div class="flex justify-end pt-4">
                <button type="submit" 
                  [disabled]="invitacionForm.invalid || cargando"
                  class="bg-sena text-white px-10 py-4 rounded-2xl font-bold text-sm hover:scale-[1.02] active:scale-95 transition-all disabled:opacity-40 disabled:hover:scale-100 flex items-center gap-3 shadow-lg shadow-sena/20">
                  @if (cargando) {
                    <i class="pi pi-spin pi-spinner"></i>
                    <span>Procesando...</span>
                  } @else {
                    <i class="pi pi-send"></i>
                    <span>Enviar Invitación</span>
                  }
                </button>
              </div>

            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-16">
      <app-tabla-usuarios></app-tabla-usuarios>
    </div>

  </div>
</div>
