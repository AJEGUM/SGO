<div class="min-h-screen bg-[#F8FAFC] pt-8 pb-20 font-sans">
  <div class="max-w-7xl mx-auto px-6">
    
    <div class="mb-12">
      <div class="flex items-center gap-2 mb-4">
        <span class="h-1 w-8 bg-sena rounded-full"></span>
        <span class="text-sena font-black text-xs uppercase tracking-[0.3em]">Gestión de Personal</span>
      </div>
      <h1 class="text-4xl md:text-6xl font-black text-slate-900 tracking-tighter leading-none mb-4">
        Control de <span class="text-transparent bg-clip-text bg-gradient-to-r from-sena to-emerald-600">Acceso</span>
      </h1>
      <p class="text-slate-500 text-base md:text-lg max-w-2xl font-medium leading-relaxed">
        Despliegue de credenciales mediante invitaciones seguras.
      </p>
    </div>

    <div class="mb-16">
      <div class="bg-white rounded-[3rem] border border-slate-200/60 shadow-[0_20px_50px_rgba(0,0,0,0.02)] overflow-hidden">
        <div class="flex flex-col lg:flex-row">
          
          <div class="lg:w-1/3 bg-slate-50/50 p-10 border-b lg:border-b-0 lg:border-r border-slate-100">
            <div class="flex items-center gap-3 mb-8">
              <div class="w-12 h-12 bg-sena/10 rounded-2xl flex items-center justify-center text-sena">
                <i class="pi pi-user-plus text-xl"></i>
              </div>
              <h3 class="font-black text-slate-900 uppercase text-sm tracking-tighter">Invitación</h3>
            </div>
            <ul class="space-y-6">
              <li class="flex gap-4">
                <div class="w-6 h-6 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-[10px] font-bold shrink-0">1</div>
                <p class="text-sm text-slate-600 font-medium">Se genera un token único de 24h.</p>
              </li>
              <li class="flex gap-4">
                <div class="w-6 h-6 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-[10px] font-bold shrink-0">2</div>
                <p class="text-sm text-slate-600 font-medium">Se vinculan los programas de formación.</p>
              </li>
            </ul>
          </div>

          <div class="lg:flex-1 p-8 md:p-12">
            <form [formGroup]="invitacionForm" (ngSubmit)="enviarInvitacion()" class="space-y-8">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <div class="md:col-span-2 group">
                  <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-4">Correo Institucional</label>
                  <div class="relative">
                    <i class="pi pi-envelope absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-sena transition-colors"></i>
                    <input formControlName="email" type="email" placeholder="ejemplo@sena.edu.co"
                      class="w-full pl-14 pr-6 py-5 bg-slate-50 border-2 border-transparent rounded-[2rem] outline-none focus:bg-white focus:border-sena/20 transition-all font-bold text-slate-700 shadow-inner">
                  </div>
                </div>

                <div class="group">
                  <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-4">Rol Administrativo</label>
                  <div class="relative">
                    <i class="pi pi-shield absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-sena z-10"></i>
                    <select formControlName="rol_id" 
                      class="w-full pl-14 pr-10 py-5 bg-slate-50 border-2 border-transparent rounded-[2rem] outline-none focus:bg-white focus:border-sena/20 transition-all font-bold text-slate-700 appearance-none cursor-pointer">
                      <option value="" disabled selected>Seleccionar Rol</option>
                      <option *ngFor="let rol of roles" [value]="rol.id">{{ rol.nombre_rol }}</option>
                    </select>
                    <i class="pi pi-chevron-down absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 pointer-events-none"></i>
                  </div>
                </div>

                <div class="group">
                  <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-4">Programas Vinculados</label>
                  <div class="relative">
                    <i class="pi pi-book absolute left-6 top-8 -translate-y-1/2 text-slate-300 group-focus-within:text-sena z-10"></i>
                    <select formControlName="programas" multiple
                      class="w-full pl-14 pr-6 py-4 bg-slate-50 border-2 border-transparent rounded-[2rem] outline-none focus:bg-white focus:border-sena/20 transition-all font-bold text-slate-700 cursor-pointer min-h-[120px] shadow-inner">
                      <option *ngFor="let prog of programas" [value]="prog.id || prog.programa_id">
                        {{ prog.nombre }}
                      </option>
                    </select>
                  </div>
                  <p class="text-[9px] text-slate-400 mt-2 ml-4 font-bold uppercase">Ctrl + Click para seleccionar</p>
                </div>

              </div>

              <div class="flex justify-end pt-4">
                <button type="submit" [disabled]="invitacionForm.invalid || cargando"
                  class="group relative bg-slate-900 text-white px-12 py-5 rounded-[2rem] font-black text-xs uppercase tracking-[0.2em] hover:bg-sena transition-all disabled:opacity-20 shadow-2xl shadow-slate-200">
                  <div class="relative z-10 flex items-center gap-3">
                    <i *ngIf="!cargando" class="pi pi-send group-hover:translate-x-1 group-hover:-translate-y-1 transition-all"></i>
                    <i *ngIf="cargando" class="pi pi-spin pi-spinner"></i>
                    <span>{{ cargando ? 'Enviando...' : 'Enviar Acceso' }}</span>
                  </div>
                </button>
              </div>

            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-20">
      <app-tabla-usuarios></app-tabla-usuarios>
    </div>

  </div>
</div>
