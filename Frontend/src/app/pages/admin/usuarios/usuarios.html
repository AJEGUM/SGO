<form (ngSubmit)="enviar()" #invForm="ngForm" class="p-8 space-y-6">
  
  <div class="space-y-2">
    <label class="text-sm font-semibold text-gray-700">Correo Electrónico</label>
    <div class="relative">
      <i class="pi pi-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
      <input 
        type="email" 
        name="correo"
        [(ngModel)]="invitacion.correo"
        #emailModel="ngModel"
        required
        email
        placeholder="ejemplo@sena.edu.co"
        [class.border-red-500]="emailModel.invalid && emailModel.touched"
        class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-sena/20 focus:border-sena outline-none transition-all font-sans" />
    </div>
  </div>

  <div class="space-y-2">
    <label class="text-sm font-semibold text-gray-700">Confirmar Correo</label>
    <div class="relative">
      <i class="pi pi-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
      <input 
        type="email" 
        name="confirmarCorreo"
        [(ngModel)]="invitacion.confirmarCorreo"
        required
        placeholder="Repite el correo"
        [class.border-red-500]="correosNoCoinciden"
        class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-sena/20 focus:border-sena outline-none transition-all font-sans" />
    </div>
    <p *ngIf="correosNoCoinciden" class="text-xs text-red-500 animate-pulse">Los correos no coinciden</p>
  </div>

  <div class="space-y-2">
    <label class="text-sm font-semibold text-gray-700">Rol Institucional</label>
    <div class="relative">
      <i class="pi pi-users absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
      <select 
        name="rol_id"
        [(ngModel)]="invitacion.rol_id"
        required
        class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-gray-300 appearance-none focus:ring-2 focus:ring-sena/20 focus:border-sena outline-none transition-all bg-white font-sans">
        <option [ngValue]="null" disabled>Selecciona un rol</option>
        <option *ngFor="let rol of roles" [value]="rol.rol_id">
          {{ rol.nombre_rol | uppercase }}
        </option>
      </select>
    </div>
  </div>

  <div class="pt-4 flex items-center justify-end gap-4">
    <button 
      type="button"
      (click)="resetForm()"
      class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-red-600 transition-colors">
      Limpiar
    </button>
    
    <button 
      type="submit"
      [disabled]="invForm.invalid || loading || correosNoCoinciden"
      class="btn-sena flex items-center gap-2 shadow-md shadow-sena/20 disabled:bg-gray-400 disabled:shadow-none">
      <i *ngIf="loading" class="pi pi-spin pi-spinner"></i>
      <i *ngIf="!loading" class="pi pi-send"></i>
      {{ loading ? 'Enviando...' : 'Enviar Invitación' }}
    </button>
  </div>
</form>
