<header class="mb-10 space-y-2">
  <div class="flex items-center gap-3">
    <div class="bg-sena-alpha p-2 rounded-lg">
      <i class="pi pi-cog text-sena text-2xl"></i>
    </div>
    <h1 class="text-3xl font-black text-sena-black tracking-tight">
      Gestión de <span class="text-sena">Tests</span>
    </h1>
  </div>
  <p class="text-gray-500 font-medium ml-1">
    Aquí puedes gestionar, crear y configurar los tests técnicos por programa académico.
  </p>
</header>

<div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-end bg-white p-6 rounded-[var(--radius-sena)] shadow-sm border border-gray-100">
  
  <app-seleccionar-crear-test
    label="Programa Académico"
    iconClass="pi pi-bookmark"
    [options]="programas"
    [modelValue]="programaSeleccionado"
    bindValue="programa_id"
    bindLabel="programa_nombre"
    bindSecondaryLabel="programa_codigo"
    placeholder="Seleccione el programa..."
    (valueChange)="onProgramaChange($event)">
  </app-seleccionar-crear-test>

  <app-seleccionar-crear-test
    label="Competencia a Evaluar"
    iconClass="pi pi-shield"
    [options]="competenciasFiltradas"
    [modelValue]="competenciaSeleccionada"
    [disabled]="!programaSeleccionado"
    bindValue="id"
    bindLabel="nombre"
    bindSecondaryLabel="codigo_norma"
    [placeholder]="!programaSeleccionado ? 'Primero elija un programa' : 'Seleccione la competencia...'"
    (valueChange)="competenciaSeleccionada = $event">
  </app-seleccionar-crear-test>

</div>
