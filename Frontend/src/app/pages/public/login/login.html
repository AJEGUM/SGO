<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 font-sans">
  
  <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
    <img class="mx-auto h-20 w-auto" src="assets/logo-sena.png" alt="SENA Logo">
    <h2 class="mt-6 text-3xl font-black text-gray-900 tracking-tight">SGO</h2>
    <p class="text-sm text-gray-600 font-medium">Sistema de Gestión de Objetos</p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow-xl border border-gray-100 sm:rounded-2xl sm:px-10">
      
      <div *ngIf="mostrarInvitacion" 
           class="mb-6 p-4 bg-green-50 border-l-4 border-[#39A900] rounded-r-lg animate-pulse">
        <div class="flex">
          <div class="flex-shrink-0">
            <svg class="h-5 w-5 text-[#39A900]" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
            </svg>
          </div>
          <div class="ml-3">
            <p class="text-xs font-bold text-green-800 uppercase tracking-wider">¡Invitación Confirmada!</p>
            <p class="text-sm text-green-700 mt-1">
              Tu acceso está listo. Por favor, inicia sesión con tu cuenta Google institucional para activar tu perfil.
            </p>
          </div>
        </div>
      </div>

      <div *ngIf="errorLogin" 
           class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-r-lg">
        <div class="flex">
          <div class="ml-3">
            <p class="text-xs font-bold text-red-800 uppercase tracking-wider">Acceso Denegado</p>
            <p class="text-sm text-red-700 mt-1">{{ errorLogin }}</p>
          </div>
        </div>
      </div>

      <div class="space-y-6">
        <p class="text-center text-sm text-gray-500">Utilice su cuenta de Google para ingresar</p>
        
        <button (click)="loginConGoogle()" 
                class="w-full flex items-center justify-center gap-3 px-4 py-3 border-2 border-gray-100 rounded-xl shadow-sm bg-white text-sm font-bold text-gray-700 hover:bg-gray-50 hover:border-[#39A900] transition-all group">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 1.16-4.53z" fill="#EA4335"/>
          </svg>
          <span class="group-hover:text-[#39A900]">Ingresar con Google</span>
        </button>
      </div>

      <div class="mt-8 pt-6 border-t border-gray-100">
        <p class="text-center text-[10px] text-gray-400 uppercase tracking-widest font-bold">
          SENA Palmira - Valle del Cauca
        </p>
      </div>
    </div>
  </div>
</div>
