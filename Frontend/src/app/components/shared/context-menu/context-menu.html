<div *ngIf="isOpen" 
     [style.top.px]="y" 
     [style.left.px]="x"
     class="fixed z-[500] w-60 bg-white/80 backdrop-blur-md rounded-[1.5rem] shadow-2xl border border-slate-100 p-2 animate-context-menu">
  
  <div class="px-4 py-2 border-b border-slate-50 mb-1">
    <p class="text-[9px] font-black uppercase text-slate-400 tracking-[0.2em] truncate">
      {{ title }}
    </p>
  </div>

  <div class="flex flex-col gap-0.5">
    <button *ngFor="let option of options" 
            (click)="onSelect(option.id)"
            [class]="'w-full flex items-center gap-3 px-3 py-2.5 text-xs font-bold rounded-xl transition-all duration-200 ' + (option.class || 'text-slate-600 hover:bg-slate-50 hover:text-sena')">
      <i [class]="option.icon + ' text-sm'"></i>
      <span class="truncate">{{ option.label }}</span>
    </button>
  </div>
</div>
