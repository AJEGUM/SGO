<div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-xl shadow-slate-200/50 overflow-hidden relative">
  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-slate-50/80 border-b border-slate-100">
          <th class="px-10 py-6 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Identidad del Experto</th>
          <th class="px-10 py-6 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 text-center">Estado</th>
          <th class="px-10 py-6 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 text-right">Acciones</th>
        </tr>
      </thead>
      
      <tbody class="divide-y divide-slate-50">
        <tr *ngFor="let exp of expertos" class="group hover:bg-slate-50/50 transition-all duration-300">
          <td class="px-10 py-7">
            <div class="flex flex-col">
              <span class="text-base font-black text-slate-800 tracking-tight leading-none mb-1 capitalize">{{ exp.usuario }}</span>
              <span class="text-xs text-slate-400 font-medium">{{ exp.correo }}</span>
            </div>
          </td>

          <td class="px-10 py-7 text-center">
            <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border"
              [ngClass]="{
                'bg-emerald-50 border-emerald-100 text-emerald-600': exp.color_alerta === 'emerald',
                'bg-amber-50 border-amber-100 text-amber-600': exp.color_alerta === 'amber',
                'bg-red-50 border-red-100 text-red-600': exp.color_alerta === 'red'
              }">
              {{ exp.disponibilidad }}
            </span>
          </td>

          <td class="px-10 py-7 text-right">
            <button (click)="abrirModal(exp)" class="text-sena hover:text-sena/70 transition-colors font-black text-[10px] uppercase tracking-tighter">
              Ver Detalles <i class="pi pi-arrow-right ml-1"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div *ngIf="isModalOpen" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm transition-all">
  
  <div class="bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden animate-in fade-in zoom-in duration-300">
    
    <div class="p-8 border-b border-slate-50 flex justify-between items-center">
      <div>
        <h3 class="text-xl font-black text-slate-800 leading-none mb-1">{{ selectedExp?.usuario }}</h3>
        <p class="text-xs text-slate-400 font-medium">Ficha Técnica del Instructor</p>
      </div>
      <button (click)="cerrarModal()" class="w-10 h-10 rounded-full bg-slate-50 text-slate-400 hover:bg-red-50 hover:text-red-500 transition-all flex items-center justify-center">
        <i class="pi pi-times"></i>
      </button>
    </div>

    <div class="p-8 space-y-6">
      
      <div>
        <h4 class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mb-3">Programas Formativos</h4>
        <div class="flex flex-wrap gap-2">
          <span *ngFor="let prog of selectedExp?.programas?.split(',')" 
                class="px-3 py-2 bg-slate-50 border border-slate-100 rounded-xl text-[11px] font-bold text-slate-700 capitalize">
            {{ prog.trim() }}
          </span>
        </div>
      </div>

      <div>
        <h4 class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mb-3">Fichas Relacionadas</h4>
        <div class="flex flex-wrap gap-2">
          <span *ngFor="let ficha of selectedExp?.fichas?.split(',')" 
                class="px-3 py-2 bg-sena/5 border border-sena/10 rounded-xl text-[11px] font-black text-sena">
            #{{ ficha.trim() }}
          </span>
        </div>
      </div>

      <div>
        <h4 class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mb-3">Carga de Competencias</h4>
        <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
          <ul class="space-y-3">
            <li *ngFor="let comp of selectedExp?.competencias?.split('|')" class="flex gap-3 text-xs text-slate-600 leading-tight font-medium">
              <i class="pi pi-check-circle text-sena text-[14px]"></i>
              {{ comp.trim() }}
            </li>
          </ul>
        </div>
      </div>

    </div>

    <div class="p-8 bg-slate-50/50 flex justify-end">
      <button (click)="cerrarModal()" class="px-6 py-3 bg-slate-800 text-white rounded-xl text-xs font-black uppercase tracking-widest hover:bg-slate-700 transition-all">
        Entendido
      </button>
    </div>
  </div>
</div>
