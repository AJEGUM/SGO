<div class="bg-white rounded-[2.5rem] border border-gray-100 shadow-sm overflow-hidden mb-12 animate-in fade-in slide-in-from-bottom-4 duration-500">
  <div class="p-8 border-b border-gray-50 bg-gray-50/30 flex items-center justify-between">
    <h3 class="font-bold text-gray-900 flex items-center gap-3">
      <div class="w-1.5 h-6 bg-sena rounded-full shadow-[0_0_10px_rgba(57,169,0,0.3)]"></div>
      Programas Registrados
    </h3>
    <span class="bg-white px-4 py-1.5 rounded-2xl text-[10px] font-black text-gray-400 border border-gray-100 shadow-sm uppercase tracking-tighter">
      {{ listaProgramas.length }} registros
    </span>
  </div>
  
  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="text-gray-400 uppercase text-[10px] font-black tracking-[0.15em] border-b border-gray-50">
          <th class="px-10 py-5">Código</th>
          <th class="px-10 py-5">Denominación del Programa</th>
          <th class="px-10 py-5 text-center">Versión</th>
          <th class="px-10 py-5 text-right">Acción</th>
        </tr>
      </thead>
      <tbody class="text-gray-700">
        @for (prog of listaProgramas; track prog.id) {
          <tr class="hover:bg-emerald-50/40 transition-all duration-300 border-b border-gray-50 last:border-0 group">
            <td class="px-10 py-6">
              <span class="font-black text-sena text-sm tracking-tight">{{ prog.codigo_programa }}</span>
            </td>
            <td class="px-10 py-6">
              <div class="font-bold text-gray-800 uppercase text-xs leading-relaxed max-w-md">
                {{ prog.nombre_programa }}
              </div>
            </td>
            <td class="px-10 py-6 text-center">
              <span class="bg-gray-100 text-gray-500 px-4 py-1.5 rounded-xl text-[10px] font-black border border-gray-200/50">
                V. {{ prog.version_programa }}
              </span>
            </td>
            <td class="px-10 py-6 text-right">
                <button (click)="verDetalle(prog.id)" 
                  class="bg-gray-50 text-gray-300 group-hover:bg-sena group-hover:text-white p-3 rounded-2xl transition-all shadow-sm group-hover:shadow-md group-hover:shadow-emerald-200">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
                  </svg>
                </button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="4" class="px-8 py-24 text-center">
              <div class="flex flex-col items-center opacity-40">
                <span class="text-5xl mb-4">📄</span>
                <p class="font-black text-gray-400 uppercase text-[10px] tracking-widest">No hay programas registrados todavía</p>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
