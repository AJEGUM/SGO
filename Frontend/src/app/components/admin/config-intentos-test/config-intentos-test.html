<section class="bg-white rounded-[var(--radius-sena)] shadow-sm border border-gray-100 overflow-hidden">
  <div class="p-6 border-b border-gray-100 bg-gray-50/50">
    <h2 class="text-xl font-semibold text-[var(--color-sena-black)] flex items-center gap-2">
      <i class="pi pi-check-square text-[var(--color-sena)]"></i>
      Parámetros de Evaluación
    </h2>
  </div>

  <div class="p-6 flex flex-col md:flex-row justify-between items-center gap-6">
    <div class="max-w-md">
      <label class="font-bold text-[var(--color-sena-black)] block">Intentos permitidos</label>
      <p class="text-sm text-gray-500">Número de veces que el aprendiz puede repetir un test antes de que se bloquee.</p>
    </div>

    <div class="flex items-center gap-4">
      <input 
        type="number" 
        [ngModel]="intentos" 
        (ngModelChange)="onModelChange($event)"
        min="1" max="10"
        class="w-20 p-2.5 border-2 border-gray-200 rounded-lg text-center font-bold focus:border-[var(--color-sena)] outline-none">
      
      <div class="flex flex-col items-end gap-2">
        <button 
          (click)="onActualizar.emit()"
          [disabled]="guardando || intentos < 1"
          class="btn-sena px-8 py-2.5 flex items-center gap-2">
          <i class="pi" [ngClass]="guardando ? 'pi-spin pi-spinner' : 'pi-sync'"></i>
          {{ guardando ? '...' : 'Actualizar' }}
        </button>
        
        <span *ngIf="exito" class="text-[var(--color-sena)] text-xs font-bold animate-fade-in">
           <i class="pi pi-check"></i> Sincronizado
        </span>
      </div>
    </div>
  </div>
</section>
