<div class="bg-white rounded-[var(--radius-sena)] shadow-xl shadow-gray-200/50 border border-gray-100 overflow-hidden">
<div class="h-1.5 w-full bg-gradient-to-r from-sena to-sena-light"></div>

<form (ngSubmit)="enviar()" #invForm="ngForm" class="p-8 md:p-12 space-y-8">
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    <div class="space-y-3 group">
        <label class="text-xs font-bold text-gray-400 uppercase tracking-widest group-focus-within:text-sena transition-colors">
        Correo del Invitado
        </label>
        <div class="relative">
        <i class="pi pi-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 group-focus-within:text-sena transition-colors"></i>
        <input type="email" name="correo" [(ngModel)]="invitacion.correo" #emailModel="ngModel" required email placeholder="nombre@sena.edu.co" class="input-sena pl-11" />
        </div>
    </div>

    <div class="space-y-3 group">
        <label class="text-xs font-bold text-gray-400 uppercase tracking-widest group-focus-within:text-sena transition-colors">
        Verificar Correo
        </label>
        <div class="relative">
        <i class="pi pi-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 group-focus-within:text-sena transition-colors"></i>
        <input type="email" name="confirmarCorreo" [(ngModel)]="invitacion.confirmarCorreo" required placeholder="Repite el correo" [class.border-red-500]="correosNoCoinciden" class="input-sena pl-11" />
        </div>
        <p *ngIf="correosNoCoinciden" class="text-[10px] text-red-500 font-bold uppercase tracking-wider animate-bounce">
        Los correos no coinciden
        </p>
    </div>
    </div>

    <div class="space-y-3 group">
    <label class="text-xs font-bold text-gray-400 uppercase tracking-widest group-focus-within:text-sena transition-colors">
        Asignar Permisos (Rol)
    </label>
    <div class="relative">
        <i class="pi pi-shield absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 group-focus-within:text-sena transition-colors"></i>
        <select name="rol_id" [(ngModel)]="invitacion.rol_id" required class="input-sena pl-11 appearance-none bg-no-repeat bg-[right_1.5rem_center]" style="background-image: url('data:image/svg+xml;charset=utf-8,<svg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22none%22 viewBox=%220 0 20 20%22><path stroke=%22%2339A900%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 stroke-width=%222%22 d=%22m6 8 4 4 4-4%22/></svg>')">
        <option [ngValue]="null" disabled>Selecciona el cargo...</option>
        <option *ngFor="let rol of roles" [value]="rol.rol_id">{{ rol.nombre_rol | uppercase }}</option>
        </select>
    </div>
    </div>

    <div *ngIf="status !== 'idle'" class="p-4 rounded-[var(--radius-sena)] border flex items-center gap-4 animate-in fade-in" [ngClass]="status === 'success' ? 'bg-sena-alpha border-sena/20 text-sena' : 'bg-red-50 border-red-100 text-red-700'">
    <i [class]="status === 'success' ? 'pi pi-verified text-xl' : 'pi pi-times-circle text-xl'"></i>
    <p class="text-sm font-semibold">{{ message }}</p>
    </div>

    <div class="pt-8 flex flex-col sm:flex-row items-center justify-between gap-6 border-t border-gray-50">
    <div class="flex items-center gap-2 text-gray-400 text-[10px] font-bold uppercase tracking-tight">
        <i class="pi pi-info-circle text-lg"></i>
        <span>Acceso válido por 24 horas</span>
    </div>
    <div class="flex items-center gap-6 w-full sm:w-auto">
        <button type="button" (click)="resetForm()" class="text-sm font-bold text-gray-400 hover:text-red-500 transition-colors uppercase tracking-widest">Cancelar</button>
        <button type="submit" [disabled]="invForm.invalid || loading || correosNoCoinciden" class="btn-sena w-full sm:w-auto justify-center group shadow-xl shadow-sena/10">
        <i *ngIf="loading" class="pi pi-spin pi-spinner text-lg"></i>
        <i *ngIf="!loading" class="pi pi-send text-lg transition-transform group-hover:translate-x-1 group-hover:-translate-y-1"></i>
        <span class="uppercase tracking-widest text-sm ml-2">{{ loading ? 'Procesando...' : 'Enviar Invitación' }}</span>
        </button>
    </div>
    </div>
</form>
</div>
