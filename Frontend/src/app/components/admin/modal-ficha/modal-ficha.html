<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm transition-all">
  
  <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl border border-slate-200 overflow-hidden animate-in fade-in zoom-in duration-300">
    
    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
      <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
        <i class="pi pi-plus-circle text-sena"></i>
        Nueva Ficha
      </h2>
      <button (click)="onCerrar()" class="text-slate-400 hover:text-slate-600 transition-colors">
        <i class="pi pi-times"></i>
      </button>
    </div>

    <form (ngSubmit)="onGuardar()" class="p-8 space-y-5">
      
      <div>
        <label class="text-xs font-bold text-slate-500 uppercase ml-1 tracking-wider">Número de Ficha</label>
        <div class="relative mt-1">
          <i class="pi pi-tag absolute left-4 top-3.5 text-slate-400"></i>
          <input type="text" [(ngModel)]="nuevaFicha.numero_ficha" name="num" required
                 class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sena/20 outline-none transition-all" 
                 placeholder="Ej: 2711448">
        </div>
      </div>

      <div>
        <label class="text-xs font-bold text-slate-500 uppercase ml-1 tracking-wider">Programa Vinculado</label>
        <div class="relative mt-1">
          <i class="pi pi-book absolute left-4 top-3.5 text-slate-400"></i>
          <select [(ngModel)]="nuevaFicha.programa_id" name="prog" required
                  class="w-full pl-11 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sena/20 outline-none cursor-pointer appearance-none">
            <option [ngValue]="0" disabled>Seleccione programa...</option>
            @for (p of programas; track p.programa_id) {
              <option [ngValue]="p.programa_id">{{ p.nombre }}</option>
            }
          </select>
          <i class="pi pi-chevron-down absolute right-4 top-4 text-[10px] text-slate-400 pointer-events-none"></i>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-xs font-bold text-slate-500 uppercase ml-1">Fecha Inicio</label>
          <input type="date" [(ngModel)]="nuevaFicha.fecha_inicio" name="f_ini" 
                 class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-sena/20 outline-none transition-all">
        </div>
        <div>
          <label class="text-xs font-bold text-slate-500 uppercase ml-1">Fecha Fin</label>
          <input type="date" [(ngModel)]="nuevaFicha.fecha_fin" name="f_fin" 
                 class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-sena/20 outline-none transition-all">
        </div>
      </div>

      <div class="flex gap-3 pt-4">
        <button type="button" (click)="onCerrar()"
                class="flex-1 px-6 py-3.5 rounded-2xl font-bold text-slate-500 hover:bg-slate-100 transition-all">
          Cancelar
        </button>
        <button type="submit" 
                class="flex-[2] bg-sena text-white py-3.5 rounded-2xl font-bold hover:opacity-90 transition-all flex items-center justify-center gap-2 shadow-lg shadow-sena/20">
          <i class="pi pi-save"></i>
          Registrar Ficha
        </button>
      </div>
    </form>
  </div>
</div>
