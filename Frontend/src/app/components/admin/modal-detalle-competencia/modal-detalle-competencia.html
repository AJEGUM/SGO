<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-gray-900/60 backdrop-blur-sm animate-in fade-in duration-300">
  
  <div class="bg-white w-full max-w-4xl max-h-[85vh] rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100 flex flex-col scale-in-center">
    
    <div class="p-6 md:p-8 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
      <div>
        <h2 class="text-xl md:text-2xl font-black text-gray-900 uppercase tracking-tight">Competencias del Programa</h2>
        <div class="flex items-center gap-2 mt-1">
            <span class="bg-sena w-2 h-2 rounded-full animate-pulse"></span>
            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Lista de normas vinculadas</p>
        </div>
      </div>
      <button (click)="cerrarModal()" class="p-3 hover:bg-gray-200 rounded-full transition-all text-gray-400 hover:text-gray-900">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto p-6 md:p-8 scrollbar-thin bg-white">
      <div class="grid grid-cols-1 gap-4">
        
        @for (comp of detalle; track comp.id) {
          <div class="group flex items-center gap-5 p-5 rounded-3xl border border-gray-100 bg-gray-50/30 hover:bg-emerald-50 hover:border-emerald-100 transition-all duration-300">
            
            <div class="bg-white text-sena w-12 h-12 rounded-2xl flex items-center justify-center flex-shrink-0 font-black text-lg shadow-sm border border-gray-100 group-hover:scale-110 transition-transform">
              {{ $index + 1 }}
            </div>
            
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-3 mb-1">
                <span class="text-[10px] font-mono font-bold text-sena bg-emerald-100/50 px-2 py-0.5 rounded">
                  {{ comp.codigo_norma }}
                </span>
                <span class="text-[10px] font-bold text-gray-300 uppercase tracking-tighter">
                  ID: {{ comp.prefijo_id }}
                </span>
              </div>
              
              <input [ngModel]="comp.nombre" 
                     (blur)="actualizar('competencia', comp.id, $event)"
                     class="w-full bg-transparent text-sm font-bold text-gray-800 outline-none border-b border-transparent focus:border-sena py-1 transition-all truncate"
                     placeholder="Nombre de la competencia">
            </div>

            <div class="text-right flex flex-col items-end">
                <span class="text-[9px] font-black text-gray-300 uppercase tracking-widest block">Duración</span>
                <div class="flex items-center gap-1">
                    <span class="text-sm font-black text-gray-700">{{ comp.duracion_horas }}</span>
                    <span class="text-[10px] font-bold text-sena uppercase">Hrs</span>
                </div>
            </div>

          </div>
        } @empty {
          <div class="flex flex-col items-center justify-center py-20 text-gray-400">
            <div class="text-6xl mb-4 opacity-20">📂</div>
            <p class="font-bold text-sm tracking-tight">No hay competencias cargadas para este programa.</p>
          </div>
        }

      </div>
    </div>

    <div class="p-6 border-t border-gray-100 flex justify-end bg-gray-50/50">
      <button (click)="cerrarModal()" 
              class="bg-gray-900 text-white px-10 py-3 rounded-2xl font-bold hover:bg-sena transition-all shadow-lg active:scale-95">
        Finalizar Revisión
      </button>
    </div>
  </div>
</div>
