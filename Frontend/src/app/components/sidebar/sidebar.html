<nav class="flex flex-col h-full bg-white border-r border-gray-200 shadow-sm">
  <div class="p-8">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-sena rounded-xl flex items-center justify-center shadow-lg shadow-sena-alpha">
        <i class="pi pi-bolt text-white text-xl"></i>
      </div>
      <div>
        <h3 class="text-xl font-black tracking-tighter text-sena-black">S.G.O</h3>
        <span class="text-[9px] text-sena font-bold uppercase tracking-widest">Sistema de Gestión</span>
      </div>
    </div>
  </div>

  <div class="mx-4 mb-6 p-4 bg-sena-gray-light rounded-2xl border border-gray-100">
    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tight">Usuario Activo</p>
    <p class="text-sm font-bold text-sena-black truncate">{{ authService.currentUser()?.nombre }}</p>
  </div>

  <ul class="flex-1 px-3 space-y-1">
    <li *ngFor="let option of menuFiltrado">
      <a [routerLink]="option.route" 
         routerLinkActive="active-sena-link"
         [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group hover:bg-sena-alpha text-gray-500 hover:text-sena">
        <i [class]="'pi pi-' + option.icon + ' text-lg transition-transform group-hover:scale-110'"></i>
        <span class="text-sm font-semibold">{{ option.label }}</span>
      </a>
    </li>
  </ul>

  <div class="p-4 border-t border-gray-50">
    <button (click)="logout()" 
            class="w-full flex items-center justify-center gap-2 py-3 rounded-xl text-gray-400 hover:bg-red-50 hover:text-red-600 transition-all duration-200 font-bold text-sm group">
      <i class="pi pi-power-off group-hover:rotate-12 transition-transform"></i>
      <span>Cerrar Sesión</span>
    </button>
  </div>
</nav>
